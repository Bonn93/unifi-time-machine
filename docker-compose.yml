version: '3.8'

# UniFi Time Machine — Docker Compose
#
# Replace the four IMPORTANT values below, then run:
#   docker compose up -d
#
# All other settings (video format, quality, retention, etc.) are configured
# at runtime via Admin → Settings in the web UI — no restart required.

services:
  unifi-time-machine:
    image: mbern/unifi-time-machine:latest
    container_name: unifi-time-machine
    restart: unless-stopped
    ports:
      - "8000:8080"
    volumes:
      - ./data:/app/data
    environment:
      TZ: 'Australia/Sydney'
      GIN_MODE: 'release'

      # --- UniFi Protect (required) ---
      UFP_HOST: '192.168.1.1'                      # IP / hostname of your Protect controller
      UFP_API_KEY: 'your_api_key_here'              # IMPORTANT: API key from Protect user settings
      TARGET_CAMERA_ID: 'your_camera_id_here'       # IMPORTANT: Camera ID from the Protect URL

      # --- Authentication (required) ---
      APP_KEY: 'your_random_base64_key_here'        # IMPORTANT: generate with: head -c 32 /dev/urandom | base64
      ADMIN_PASSWORD: 'your_secure_password_here'   # IMPORTANT: initial admin password

      # --- Optional: seed initial settings (first launch only, ignored after) ---
      # These set the starting values in the database on the very first run.
      # Remove or leave commented after initial setup — use Admin → Settings instead.
      #
      # VIDEO_FORMAT: 'hls'           # webm (AV1) | mp4 (H.264) | hls (adaptive, recommended)
      # VIDEO_QUALITY: 'high'         # low | medium | high | ultra
      # TIMELAPSE_INTERVAL: '3600'    # seconds between snapshots (default: 3600 = 1 hour)
      # HQSNAP: 'auto'                # auto | true | false
